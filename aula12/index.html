<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartão Dev</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            padding: 20px;  
        }

        .painel {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            border: none;
            width: 300px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        input {
            padding: 8px;
            width: 90%;
            margin-bottom: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px;
            background: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        button:hover {
            background: #004494;
        }

        .cartao {
            background: #fff;
            color: #333;
            padding: 15px;
            border-radius: 8px;
            width: 300px;
            border-left: 10px solid #0056b3;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .cartao h3 {
            margin: 0 0 10px 0;
            color: #0056b3;
        }

        .cartao p {
            margin: 5px 0;
        }

        .destaque {
            font-weight: bold;
            color: #0056b3;
        }


    </style>
</head>

<body>
    <div class="painel">
        <h2>Cadastro de Perfil</h2>
        <label>Nome do Aluno/Dev</label>
        <input type="text" id="input-nome" placeholder="EX: Celide">

        <label>Linguagem Favorita:</label>
        <input type="text" id="input-linguagem" placeholder="EX: Golang">

        <button id="btn-registrar">Criar Perfil</button>

    </div>

    <div class="cartao">
        <h3>Perfil do Dev</h3>
        <p>NOME: <span id="cartao-nome" class="destaque">???</span></p>
        <p>LINGUAGEM: <span id="cartao-linguagem" class="destaque">???</span></p>
    </div>
    <script src="manipularDOM.js"></script>
</body>
</html>
